# Мост ЭДО ↔ iiko: тесты в CI, ручной запуск моста с секретами из GitHub Secrets
name: EDI-Doc bridge (ЭДО ↔ iiko)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r edo_iiko_bridge/requirements.txt -r edo_iiko_bridge/requirements-dev.txt

      - name: Run tests
        run: pytest edo_iiko_bridge/tests -v

  run-bridge:
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      # Диадок — добавить в Secrets репо
      DIADOC_API_KEY: ${{ secrets.DIADOC_API_KEY }}
      DIADOC_LOGIN: ${{ secrets.DIADOC_LOGIN }}
      DIADOC_PASSWORD: ${{ secrets.DIADOC_PASSWORD }}
      # iiko — те же секреты, что и для ETL (уже есть в репо)
      IIKO_BASE_URL: ${{ secrets.IIKO_BASE_URL }}
      IIKO_LOGIN: ${{ secrets.IIKO_LOGIN }}
      IIKO_PASS_SHA1: ${{ secrets.IIKO_PASS_SHA1 }}
      IIKO_VERIFY_SSL: ${{ secrets.IIKO_VERIFY_SSL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r edo_iiko_bridge/requirements.txt

      - name: Run bridge (fetch incoming)
        run: python -m edo_iiko_bridge.cli fetch-incoming
