name: Inventory alerts to Telegram

on:
  workflow_dispatch: {}

jobs:
  send-alerts:
    runs-on: ubuntu-latest

    env:
      # Neon
      NEON_HOST: ${{ secrets.NEON_HOST }}
      NEON_DB: ${{ secrets.NEON_DB }}
      NEON_USER: ${{ secrets.NEON_USER }}
      NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}

      # Telegram
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ALERTS_TOP_N: ${{ secrets.ALERTS_TOP_N }}

      # Режим работы бота: one-shot отправка отчёта
      ALERTS_MODE: "once"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send alerts to Telegram
        run: |
          python alerts_bot.py

