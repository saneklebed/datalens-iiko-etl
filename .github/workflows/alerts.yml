name: Inventory alerts to Telegram

on:
  # Ручной запуск из GitHub Actions
  workflow_dispatch: {}

  # Автозапуск: каждый вторник в 12:00 по Москве (= 09:00 UTC)
  schedule:
    - cron: "0 9 * * TUE"

jobs:
  send-alerts:
    runs-on: ubuntu-latest

    env:
      # Neon
      NEON_HOST: ${{ secrets.NEON_HOST }}
      NEON_DB: ${{ secrets.NEON_DB }}
      NEON_USER: ${{ secrets.NEON_USER }}
      NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}

      # Telegram (ALERTS_TOP_N опционально — по умолчанию 10)
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Режим работы бота: one-shot отправка отчёта
      ALERTS_MODE: "once"

      # Kvant API
      KVANT_API_KEY: ${{ secrets.KVANT_API_KEY }}
      KVANT_ASSIGNEE_ID: ${{ secrets.KVANT_ASSIGNEE_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send alerts to Telegram
        run: |
          python alerts_bot.py

